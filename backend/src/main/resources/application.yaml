spring:
  application:
    name: FLL Hub Backend
  datasource:
    # Connects to localhost:5432 (your Docker container)
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:fll_hub}
    username: ${PGUSER:dev}
    password: ${PGPASSWORD:dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    # "update": Automatically creates/updates tables based on your Java code
    hibernate:
      ddl-auto: update
    # Shows the SQL queries in the console (useful for debugging)
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
management:
  endpoints:
    web:
      exposure:
        include: "health,metrics"
